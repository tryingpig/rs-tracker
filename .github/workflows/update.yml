name: update-rs-data
on:
  schedule:
    - cron: '30 9 * * 1-5'      # 18:30 KST (09:30 UTC), 평일
  workflow_dispatch:            # 수동 실행(파이프라인 검증용)
permissions:
  contents: write
concurrency:
  group: update-rs-data
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      # Notion 'RS 섹터 보정 DB' → data/sector_override.csv (섹터 교정값 최신 반영)
      - name: Sync sector override from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/sync_from_notion.py
      - name: build data
        env:
          KRX_ID: ${{ secrets.KRX_ID }}   # data.krx.co.kr(KRX 정보데이터시스템) 회원 ID
          KRX_PW: ${{ secrets.KRX_PW }}   # 지수·구성종목 조회에 로그인 필요(pykrx 1.2.8+)
        run: python scripts/build_json.py
      # 새로 생긴 '기타' 종목을 RS 섹터 보정 DB에 자동 추가(섹터 미지정·활성 OFF)
      - name: Push new unknown-sector stocks to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/push_unknown_to_notion.py
      - name: commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: update $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

  # 섹터 캐시는 자주 안 바뀌므로 월 1회만 강제 갱신
  # needs: build → build 완료(push) 후 실행해 동시 push 충돌(race) 방지
  refresh-sectors:
    needs: build
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: refresh sectors (1st business day only)
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          if [ "$(date -u +%d)" -le "03" ]; then
            python scripts/build_json.py --refresh-sectors
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add data/
            git diff --staged --quiet || git commit -m "sectors: monthly refresh"
            git push
          else
            echo "이번 실행은 섹터 갱신 대상 아님(매월 초 3일 이내만)."
          fi
